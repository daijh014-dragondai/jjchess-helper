name: 构建JJ象棋AI悬浮助手 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk autoconf automake libtool \
            autopoint m4 pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev cmake libffi-dev libssl-dev python3-pip
          pip install --upgrade pip buildozer setuptools
          pip install "cython==0.29.37"

      - name: 设置 Java 17
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          java -version

      - name: 初始化 Android SDK
        run: |
          # 清空旧SDK
          rm -rf ~/.buildozer/android/platform/android-sdk
          mkdir -p ~/.buildozer/android/platform/android-sdk
          cd ~/.buildozer/android/platform/android-sdk
          
          # 下载命令行工具
          curl -sSLO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          rm -f commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools tools
          
          # 创建许可证文件（SDK manager需要这个）
          mkdir -p licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > licenses/android-sdk-preview-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > licenses/intel-android-extra-license
          
          # 安装必要组件
          yes | tools/bin/sdkmanager --sdk_root=$(pwd) --licenses 2>&1 | tail -2
          yes | tools/bin/sdkmanager --sdk_root=$(pwd) "platform-tools" "platforms;android-31" 2>&1 | tail -3
          
          echo "SDK准备完毕"

      - name: 构建 APK
        run: |
          cd ${{ github.workspace }}
          buildozer android debug 2>&1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: JJChessHelper-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
