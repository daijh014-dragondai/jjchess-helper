name: 构建JJ象棋AI悬浮助手 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev python3-pip
          pip install --upgrade pip buildozer cython

      - name: 设置系统自带的 Android SDK
        run: |
          # 列出系统自带的SDK
          echo "=== 系统SDK ==="
          ls /usr/local/lib/android/sdk/ 2>/dev/null || echo "无系统SDK"
          ls /usr/local/lib/android/sdk/platforms/ 2>/dev/null || echo "无platforms"
          ls /usr/local/lib/android/sdk/build-tools/ 2>/dev/null || echo "无build-tools"
          ls /usr/local/lib/android/sdk/ndk/ 2>/dev/null || echo "无ndk"
          
          echo "=== 备用路径 ==="
          ls /usr/lib/android-sdk/ 2>/dev/null || echo "无备用SDK"
          
          # 使用 ANDROID_HOME 环境变量
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: 构建 APK
        env:
          ANDROIDSDK: /usr/local/lib/android/sdk
        run: |
          buildozer android debug 2>&1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: JJChessHelper-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
