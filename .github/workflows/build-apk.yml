name: 构建JJ象棋AI悬浮助手 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf \
            libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev cmake libffi-dev \
            libssl-dev libltdl-dev
          pip install --upgrade pip buildozer cython

      - name: 设置 Android SDK（避免许可证问题）
        run: |
          # 清空可能被污染的缓存（避免tools/bin/sdkmanager缺失问题）
          rm -rf ~/.buildozer/android/platform/android-sdk
          
          # 直接下载并安装 Android 命令行工具
          mkdir -p ~/.buildozer/android/platform/android-sdk
          cd ~/.buildozer/android/platform/android-sdk
          
          # 下载新版命令行工具
          curl -sSLO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          rm -f commandlinetools-linux-11076708_latest.zip
          
          # 创建 tools 软链接（Buildozer 需要这个路径）
          mv cmdline-tools tools
          
          # 接受所有许可证
          yes | tools/bin/sdkmanager --sdk_root=$(pwd) --licenses > /dev/null 2>&1 || true
          
          # 安装必要组件
          yes | tools/bin/sdkmanager --sdk_root=$(pwd) "platform-tools" "build-tools;34.0.0" "platforms;android-31" > /dev/null 2>&1 || true
          
          echo "✅ Android SDK 设置完成"
          ls -la ~/.buildozer/android/platform/android-sdk/

      - name: 构建 APK
        run: |
          cd ${{ github.workspace }}
          buildozer android debug 2>&1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: JJChessHelper-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
