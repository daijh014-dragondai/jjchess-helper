name: 构建JJ象棋AI悬浮助手 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖（含编译工具）
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk autoconf automake libtool \
            autopoint m4 pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev cmake libffi-dev libssl-dev python3-pip
          pip install --upgrade pip buildozer cython setuptools

      - name: 设置 Java 17 环境
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          sudo update-java-alternatives -s java-1.17.0-openjdk-amd64 2>/dev/null || true
          java -version

      - name: 预装 Android SDK
        run: |
          rm -rf ~/.buildozer/android/platform/android-sdk
          mkdir -p ~/.buildozer/android/platform/android-sdk
          cd ~/.buildozer/android/platform/android-sdk
          curl -sSLO https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          rm -f commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools tools
          yes | tools/bin/sdkmanager --sdk_root=$(pwd) --licenses 2>&1 | tail -3
          yes | tools/bin/sdkmanager --sdk_root=$(pwd) "platform-tools" "build-tools;37.0.0" "platforms;android-31" 2>&1 | tail -5

      - name: 构建 APK
        run: |
          buildozer android debug 2>&1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: JJChessHelper-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
